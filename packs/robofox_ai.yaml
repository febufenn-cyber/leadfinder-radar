# robofox_ai — chatbots, WhatsApp automation, AI workflow/agent builds (DESIGN §1)
# Disabled template: enable after M1 classifier lands and robofox_web precision looks sane.
name: robofox_ai
enabled: false
description: Chatbots, WhatsApp automation, AI workflow/agent builds, Meta ads setup.

reddit:
  subreddits:
    - smallbusiness
    - Entrepreneur
    - startups
    - SaaS
    - developersIndia
    - indianstartups
  search_queries:
    - chatbot for my business
    - whatsapp automation
    - automate my business

# Threads discovery queries (query-driven; inert until Threads discovery is live —
# see robofox_web for the full note). Keep aligned with `include`.
threads:
  search_queries:
    - chatbot for my business
    - whatsapp automation
    - ai automation for

keywords:
  include:
    - chatbot for
    - whatsapp automation
    - whatsapp bot
    - automate my
    - ai agent for
    - ai automation
    - meta ads setup
  # Build/automation-intent openers, OR'd with `include` (see robofox_web note).
  # Anchored to THIS pack's domain (bots/agents/automation), not bare
  # payment/dev tokens, so they don't open unrelated dev gigs to the classifier.
  signals:
    - someone to build
    - need someone to build
    - automate this
    - automate our
    - build a bot
    - build a chatbot
    - build an agent
  exclude:
    - for free
    - unpaid
    - no budget
    - full-time
    - full time job
    - homework
    - for hire

max_age_minutes: 180
