name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize-lock:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Generate lock and restore permanent CI
        run: |
          uv lock
          cp .github/ci.final.yml .github/workflows/ci.yml
          rm .github/ci.final.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock .github/workflows/ci.yml .github/ci.final.yml
          if ! git diff --cached --quiet; then
            git commit -m "chore: lock stable MCP SDK dependency"
            git push origin HEAD:${{ github.head_ref }}
          fi
