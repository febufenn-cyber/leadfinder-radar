name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leadfinder
          POSTGRES_PASSWORD: leadfinder
          POSTGRES_DB: leadfinder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadfinder -d leadfinder_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@localhost:5432/leadfinder_test
      TEST_DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@localhost:5432/leadfinder_test
      REDIS_URL: redis://localhost:6379/0
      ENV: development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Verify clean migration chain
        run: uv run alembic upgrade head
      - name: Verify previous-head upgrade
        run: |
          uv run alembic downgrade 008
          uv run alembic upgrade head
      - name: MCP smoke
        run: uv run python scripts/mcp_smoke.py --in-memory
      - name: Test
        run: uv run pytest -q --junitxml=pytest-results.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore
