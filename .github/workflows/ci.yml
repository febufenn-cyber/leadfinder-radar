name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leadfinder
          POSTGRES_PASSWORD: leadfinder
          POSTGRES_DB: leadfinder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadfinder -d leadfinder_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@localhost:5432/leadfinder_test
      TEST_DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@localhost:5432/leadfinder_test
      REDIS_URL: redis://localhost:6379/0
      ENV: development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install locked dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Verify clean migration chain
        run: uv run alembic upgrade head
      - name: Verify previous-head upgrade
        run: |
          uv run alembic downgrade 008
          uv run alembic upgrade head
      - name: MCP smoke
        run: |
          set +e
          uv run python scripts/mcp_smoke.py --in-memory >mcp-smoke.log 2>&1
          status=$?
          cat mcp-smoke.log
          exit $status
      - name: Upload MCP smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-smoke
          path: mcp-smoke.log
          if-no-files-found: ignore
      - name: Test
        run: uv run pytest -q --junitxml=pytest-results.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: ignore

  finalize-m6-reference:
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Build finalized feature reference
        run: python scripts/append_m6_features.py
      - name: Commit feature reference through GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          current_sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/docs/FEATURES.md?ref=${TARGET_BRANCH}" --jq .sha)
          encoded=$(base64 -w0 docs/FEATURES.md)
          jq -n \
            --arg message "docs: append M6 feature reference" \
            --arg content "$encoded" \
            --arg sha "$current_sha" \
            --arg branch "$TARGET_BRANCH" \
            '{message:$message,content:$content,sha:$sha,branch:$branch}' > /tmp/features-update.json
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/docs/FEATURES.md" --input /tmp/features-update.json
