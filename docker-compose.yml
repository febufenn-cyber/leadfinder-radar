services:
  postgres:
    image: postgres:16-alpine
    container_name: leadfinder-postgres
    environment:
      POSTGRES_USER: leadfinder
      POSTGRES_PASSWORD: leadfinder
      POSTGRES_DB: leadfinder
    ports:
      - "127.0.0.1:5442:5432"  # localhost only; 5432 is taken by probexa on the dev Mac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: leadfinder-postgres-test
    environment:
      POSTGRES_USER: leadfinder
      POSTGRES_PASSWORD: leadfinder
      POSTGRES_DB: leadfinder_test
    ports:
      - "127.0.0.1:5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # in-memory; tests are throwaway

  redis:
    image: redis:7-alpine
    container_name: leadfinder-redis
    ports:
      - "127.0.0.1:6380:6379"  # localhost only; 6379 is taken by probexa on the dev Mac
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- app profile: supervised worker + dashboard for unattended runs (VPS) ----
  # Local dev can keep using `uv run ...` directly; on the VPS:
  #   docker compose --profile app up -d --build
  #   docker compose --profile app run --rm worker uv run alembic upgrade head
  worker:
    build: .
    container_name: leadfinder-worker
    profiles: ["app"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@postgres:5432/leadfinder
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    container_name: leadfinder-bot
    profiles: ["app"]
    command: ["uv", "run", "python", "-m", "app.bot"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@postgres:5432/leadfinder
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    container_name: leadfinder-dashboard
    profiles: ["app"]
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8100"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://leadfinder:leadfinder@postgres:5432/leadfinder
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
