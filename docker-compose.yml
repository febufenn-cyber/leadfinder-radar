services:
  postgres:
    image: postgres:16-alpine
    container_name: leadfinder-postgres
    environment:
      POSTGRES_USER: leadfinder
      POSTGRES_PASSWORD: leadfinder
      POSTGRES_DB: leadfinder
    ports:
      - "5442:5432"  # 5432 is taken by probexa-postgres on this machine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadfinder"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: leadfinder-postgres-test
    environment:
      POSTGRES_USER: leadfinder
      POSTGRES_PASSWORD: leadfinder
      POSTGRES_DB: leadfinder_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # in-memory; tests are throwaway

  redis:
    image: redis:7-alpine
    container_name: leadfinder-redis
    ports:
      - "6380:6379"  # 6379 is taken by probexa-redis on this machine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
